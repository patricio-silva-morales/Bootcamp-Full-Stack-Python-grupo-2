<!DOCTYPE html>
<html>
<head>
  <title>Wallet - Menú Principal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Menú Principal</h2>
    <div class="form-group text-center">
      <label for="balance">Dinero en cuenta:</label>
      <h3>$<span id="balance">0</span></h3>
    </div>
    <div class="d-grid gap-2">
      <button class="btn btn-primary" onclick="cargaDepositar();">Depositar</button>
      <button class="btn btn-primary" onclick="cargaEnviarDinero();">Enviar Dinero</button>
      <button class="btn btn-primary" onclick="cargaUltimosMovimientos();">Últimos Movimientos</button>
    </div>
    <p id="resultado"></p>
  </div>

  <script>
    document.getElementById("balance").textContent = Number(localStorage.getItem("balance")).toLocaleString();

    function cargaDepositar() {
      document.getElementById("resultado").textContent = "Redirigiendo a depositar";

      window.location.href = "./deposit.html";
    }

    function cargaEnviarDinero() {
      document.getElementById("resultado").textContent = "Redirigiendo a enviar dinero";

      window.location.href = "./sendmoney.html";      
    }

    function cargaUltimosMovimientos() {
      document.getElementById("resultado").textContent = "Redirigiendo a últimos movimientos";
      
      window.location.href = "./transactions.html";
    }
  </script>
</body>
</html>
