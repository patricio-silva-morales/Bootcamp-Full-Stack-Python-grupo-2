<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PROMEDIO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <div class="container mt-4">
        <h1>Promedio de Notas</h1>

        <div class="mb-3">
            <input type="number" id="nota1" placeholder="Ingrese la nota 1" class="form-control" step="0.1">
        </div>

        <div class="mb-3">
            <input type="number" id="nota2" placeholder="Ingrese la nota 2" class="form-control" step="0.1">
        </div>

        <div class="mb-3">
            <input type="number" id="nota3" placeholder="Ingrese la nota 3" class="form-control" step="0.1">
        </div>

        <div class="mb-3">
            <button id="calcular" class="btn btn-primary">Calcular promedio</button>
        </div>

        <div class="mb-3">
            <p id="resultado"></p>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $("#calcular").click(function() {
                let nota1 = Number($("#nota1").val());
                let nota2 = Number($("#nota2").val());
                let nota3 = Number($("#nota3").val());

                let promedio = (nota1 + nota2 + nota3) / 3;

                $("#resultado").text("El promedio final es: " + promedio.toFixed(2));
            });
        });
    </script>
</body>
</html>
