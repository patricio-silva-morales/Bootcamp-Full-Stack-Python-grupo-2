<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8">
    <title>Cotización de Arriendo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #8d2705; }
        .card-header { background-color: hsl(354, 90%, 39%); color: white; }
        .card-body { background-color: #f0fff4; }
        #resultado { display: none; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-header">
                    <h4>🚗 Cotiza con nosotros</h4>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Nombre del cliente</label>
                        <input type="text" id="cliente" class="form-control" placeholder="Nombre Completo">
                    </div>
                    <div class="form-group">
                        <label>Días de arriendo</label>
                        <input type="number" id="dias" class="form-control" placeholder="Cantidad de dias">
                    </div>
                    <div class="form-group">
                        <label>Valor diario del vehículo ($)</label>
                        <input type="number" id="valorVehiculo" class="form-control" placeholder="Ej: 35000">
                    </div>
                    <div class="form-group">
                        <label>Valor diario del seguro ($)</label>
                        <input type="number" id="valorSeguro" class="form-control" placeholder="Ej: 5000">
                    </div>
                        <button id="btnGenerar" class="btn btn-success btn-block">
                    Generar Cotización
                    </button>
                </div>
            </div>

            <div id="resultado" class="card mt-4">
                <div class="card-header">
                    <h4>📄 Tu Cotización</h4>
                </div>
                <div class="card-body">
                    <p><strong>Cliente:</strong> <span id="rCliente"></span></p>
                    <p><strong>Días:</strong> <span id="rDias"></span></p>
                    <p><strong>Costo vehículo:</strong> <span id="rVehiculo"></span></p>
                    <p><strong>Costo seguro:</strong> <span id="rSeguro"></span></p>
                    <hr>
                    <h5><strong>Total a pagar:</strong> <span id="rTotal" class="text-success"></span></h5>
                </div>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function() {
            $("#btnGenerar").click(function() {

            let cliente = $("#cliente").val().trim();
            let dias = Number($("#dias").val());
            let valorVehiculo = Number($("#valorVehiculo").val());
            let valorSeguro = Number($("#valorSeguro").val());

            if (cliente === "" || dias <= 0 || valorVehiculo <= 0 || valorSeguro <= 0) {
                alert("Por favor, completa todos los campos correctamente.");
                return;
            }

            let costoVehiculo = dias * valorVehiculo;
            let costoSeguro = dias * valorSeguro;
            let totalPagar = costoVehiculo + costoSeguro;

            $("#rCliente").text(cliente);
            $("#rDias").text(dias);
            $("#rVehiculo").text("$" + costoVehiculo.toLocaleString("es-CL"));
            $("#rSeguro").text("$" + costoSeguro.toLocaleString("es-CL"));
            $("#rTotal").text("$" + totalPagar.toLocaleString("es-CL"));

            $("#resultado").show();
            });
        });
    </script>

</body>
</html>
