<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo de JQuery</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    </head>
    <body>
        <div class="container mb-3">
            <h1>Suma de números</h1>
            <div class="mb-3">
                <input type="number" id="num1" placeholder="Ingrese un número" class="form-control">
            </div>
            <div class="mb-3">
                <input type="number" id="num2" placeholder="Ingrese un número" class="form-control">
            </div>
            <div class="mb-3">
                <button id="suma" class="btn btn-primary">Sumar</button>
            </div>
            <div class="mb-3">
                <button id="resta" class="btn btn-primary">Restar</button>
            </div>
            <div class="mb-3">
                <button id="multiplicacion" class="btn btn-primary">Multiplicar</button>
            </div>
            <div class="mb-3">
                <button id="division" class="btn btn-primary">Dividir</button>
            </div>
            <div class="mb-3">
                <p id="resultado"></p>
            </div>
        </div>

        <script>
            $(document).ready(function() {
                // Reacciona al hacer clic en botón Sumar
                $("#suma").click(function() {
                    let numero1 = Number($("#num1").val());
                    let numero2 = Number($("#num2").val());

                    let resultado = numero1 + numero2;

                    $("#resultado").text(resultado);
                });
                // Reacciona al hacer clic en botón Restar
                $("#resta").click(function() {
                    let numero1 = Number($("#num1").val());
                    let numero2 = Number($("#num2").val());

                    let resultado = numero1 - numero2;

                    $("#resultado").text(resultado);
                });
                // Reacciona al hacer clic en botón Multiplicar
                $("#multiplicacion").click(function() {
                    let numero1 = Number($("#num1").val());
                    let numero2 = Number($("#num2").val());

                    let resultado = numero1 * numero2;

                    $("#resultado").text(resultado);
                });
                // Reacciona al hacer clic en botón Dividir
                $("#division").click(function() {
                    let numero1 = Number($("#num1").val());
                    let numero2 = Number($("#num2").val());

                    let resultado = numero1 / numero2;

                    $("#resultado").text(resultado);
                });
            });
        </script>
    </body>
</html>
