<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo de uso de LocalStorage</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <button class="btn btn-primary" onclick="incrementar();">Incrementar contador</button>
            <a href="./index.html" class="btn btn-primary">Volver a Index</a>
        </div>

        <script>
            function incrementar() {
                let contador = Number(localStorage.getItem("contador"));
                
                localStorage.setItem("contador", contador + 1);
            }

        </script>
    </body>
</html>
