<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo de uso de LocalStorage</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <h1>Valor: <span id="valor"></span></h1>

            <button class="btn btn-primary" onclick="iniciar();">Iniciar contador</button>
            <a href="./contador.html" class="btn btn-primary">Ir a incrementar</a>
        </div>

        <script>
            let objeto = localStorage.getItem("contador");

            if (objeto == null) {
                localStorage.setItem("contador", 0);
            } else {
                document.getElementById("valor").textContent = localStorage.getItem("contador");
            }

            function iniciar() {
                localStorage.setItem("contador", 0);

                window.location.href = "./index.html";
            }

        </script>
    </body>
</html>
